[pytest]
# Only collect the real test package under tests/.
#
# test_mcp_server.py at the repo root is a STANDALONE smoke script
# (run as: python test_mcp_server.py), not a pytest module — it executes its body
# and reassigns sys.stdout at import. When pytest auto-collects it as test_*.py,
# that import-time stdout reassignment detaches pytest's fd-level capture buffer
# and crashes capture teardown ("I/O operation on closed file"). Scoping
# collection to tests/ keeps the canonical `pytest` invocation clean.
testpaths = tests

# Use Python-level capture (sys), not the default fd-level dup. Several modules in
# this repo reconfigure sys.stdout to UTF-8 (for Windows cp1252 consoles); under
# fd capture that can detach pytest's capture tmpfile and crash capture teardown
# ("I/O operation on closed file"), spuriously failing an unrelated test. With sys
# capture there is no dup'd fd to close, and sys.stdout has no .reconfigure() so
# those guards safely no-op. `-s` still disables capture entirely when needed.
addopts = --capture=sys
