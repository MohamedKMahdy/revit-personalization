[pytest]
# Only collect the real test package under tests/.
#
# test_mcp_server.py at the repo root is a STANDALONE smoke script
# (run as: python test_mcp_server.py), not a pytest module — it executes its body
# and reassigns sys.stdout at import. When pytest auto-collects it as test_*.py,
# that import-time stdout reassignment detaches pytest's fd-level capture buffer
# and crashes capture teardown ("I/O operation on closed file"). Scoping
# collection to tests/ keeps the canonical `pytest` invocation clean.
testpaths = tests
