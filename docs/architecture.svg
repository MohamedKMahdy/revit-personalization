<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">Agent-Augmented BIM Log Mining — system architecture</title>
  <desc id="dsc">A pipeline that learns a user's repeated Revit routine from logs, understands it, executes it in the live model through the bim-mcp server, and grows new compiled tools from code the agent writes.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b5b6b"/>
    </marker>
    <marker id="arrp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7F77DD"/>
    </marker>
  </defs>
  <style>
    .bx{fill:#ffffff;stroke-width:1.5;rx:9}
    .t{font-weight:600;font-size:14px;fill:#26215C}
    .s{font-size:11.5px;fill:#6b6b80}
    .lbl{font-size:12px;font-weight:700;letter-spacing:.04em}
    .flow{stroke:#5b5b6b;stroke-width:1.6;fill:none}
    .fb{stroke:#7F77DD;stroke-width:1.6;fill:none;stroke-dasharray:5 4}
    .fbt{font-size:11px;fill:#534AB7;font-style:italic}
  </style>

  <text x="500" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#26215C">Agent-Augmented BIM Log Mining — System Architecture</text>
  <text x="500" y="54" text-anchor="middle" class="s" font-size="12.5">Learn a user's routine → understand it → execute it in the live model → grow new tools</text>

  <!-- ① UNDERSTAND band -->
  <rect x="20" y="78" width="960" height="128" rx="12" fill="#EEEDFE"/>
  <text x="36" y="98" class="lbl" fill="#534AB7">① UNDERSTAND  (learn the behaviour, not just detect)</text>
  <g>
    <rect class="bx" x="34"  y="112" width="216" height="72" rx="9" stroke="#9aa0e0"/>
    <text x="142" y="142" text-anchor="middle" class="t">Revit + generalBIMlog</text>
    <text x="142" y="162" text-anchor="middle" class="s">user actions → logs</text>

    <rect class="bx" x="278" y="112" width="206" height="72" rx="9" stroke="#7F77DD"/>
    <text x="381" y="142" text-anchor="middle" class="t">Detector</text>
    <text x="381" y="162" text-anchor="middle" class="s">cluster repeated steps</text>

    <rect class="bx" x="512" y="112" width="206" height="72" rx="9" stroke="#7F77DD"/>
    <text x="615" y="142" text-anchor="middle" class="t">Pattern Agent</text>
    <text x="615" y="162" text-anchor="middle" class="s">learn the motif (LLM)</text>

    <rect class="bx" x="746" y="112" width="216" height="72" rx="9" stroke="#534AB7"/>
    <text x="854" y="139" text-anchor="middle" class="t">Understanding + Memory</text>
    <text x="854" y="158" text-anchor="middle" class="s">per-user prior · rules</text>
    <text x="854" y="174" text-anchor="middle" class="s">intent · confirmed/corrected</text>
  </g>
  <line class="flow" x1="250" y1="148" x2="276" y2="148" marker-end="url(#arr)"/>
  <line class="flow" x1="484" y1="148" x2="510" y2="148" marker-end="url(#arr)"/>
  <line class="flow" x1="718" y1="148" x2="744" y2="148" marker-end="url(#arr)"/>

  <!-- learned routine + prior -> executor -->
  <path class="flow" d="M854,184 C854,232 200,232 130,360" marker-end="url(#arr)"/>
  <text x="470" y="226" text-anchor="middle" class="s">learned routine + per-user prior (Mark anchored to the live model)</text>

  <!-- chatbot -->
  <rect class="bx" x="600" y="250" width="200" height="60" rx="9" stroke="#cfcfe0"/>
  <text x="700" y="276" text-anchor="middle" class="t">Chatbot — :5000</text>
  <text x="700" y="295" text-anchor="middle" class="s">user chat · SSE · history</text>
  <path class="flow" d="M600,288 C470,300 360,330 330,358" marker-end="url(#arr)"/>

  <!-- ② EXECUTE band -->
  <rect x="20" y="338" width="960" height="120" rx="12" fill="#E1F5EE"/>
  <text x="36" y="358" class="lbl" fill="#0F6E56">② EXECUTE  (act in the live model)</text>
  <g>
    <rect class="bx" x="34"  y="372" width="280" height="66" rx="9" stroke="#1D9E75"/>
    <text x="174" y="400" text-anchor="middle" class="t">Executor</text>
    <text x="174" y="420" text-anchor="middle" class="s">agentic, self-healing loop · Haiku-first</text>

    <rect class="bx" x="360" y="372" width="280" height="66" rx="9" stroke="#0F6E56"/>
    <text x="500" y="400" text-anchor="middle" class="t">bim-mcp server — :8080</text>
    <text x="500" y="420" text-anchor="middle" class="s">owned · 34 + grown commands · headless</text>

    <rect class="bx" x="686" y="372" width="276" height="66" rx="9" stroke="#1D9E75"/>
    <text x="824" y="400" text-anchor="middle" class="t">Revit</text>
    <text x="824" y="420" text-anchor="middle" class="s">assistant places / sets / tags</text>
  </g>
  <line class="flow" x1="314" y1="405" x2="358" y2="405" marker-end="url(#arr)"/>
  <line class="flow" x1="640" y1="405" x2="684" y2="405" marker-end="url(#arr)"/>

  <!-- feedback: learn from run / corrections -->
  <path class="fb" d="M120,372 C120,300 740,300 800,186" marker-end="url(#arrp)"/>
  <text x="250" y="356" class="fbt">learn from run · a correction carries forward</text>

  <!-- cycle: acts -> logged -->
  <path class="fb" d="M962,400 C988,340 988,150 250,140" marker-end="url(#arrp)"/>

  <!-- ③ GROW LOOP -->
  <rect x="20" y="488" width="960" height="150" rx="12" fill="#FAF7FF" stroke="#e3def7"/>
  <text x="36" y="510" class="lbl" fill="#534AB7">③ SELF-EXTENSION  (the grow / repair loop — ad-hoc code becomes a permanent compiled tool)</text>
  <g>
    <rect class="bx" x="40"  y="530" width="190" height="62" rx="9" stroke="#7F77DD"/>
    <text x="135" y="556" text-anchor="middle" class="t">Executor writes code</text>
    <text x="135" y="575" text-anchor="middle" class="s">missing capability →</text>

    <rect class="bx" x="290" y="530" width="210" height="62" rx="9" stroke="#7F77DD"/>
    <text x="395" y="552" text-anchor="middle" class="t">Tool Engineer</text>
    <text x="395" y="571" text-anchor="middle" class="s">write→review→test→repair</text>
    <text x="395" y="586" text-anchor="middle" class="s">compile + hot-load (no restart)</text>

    <rect class="bx" x="560" y="530" width="200" height="62" rx="9" stroke="#534AB7"/>
    <text x="660" y="556" text-anchor="middle" class="t">New compiled tool</text>
    <text x="660" y="575" text-anchor="middle" class="s">registered on :8080</text>

    <rect class="bx" x="800" y="530" width="160" height="62" rx="9" stroke="#9aa0e0"/>
    <text x="880" y="556" text-anchor="middle" class="t">Executor</text>
    <text x="880" y="575" text-anchor="middle" class="s">calls it next time</text>
  </g>
  <line class="flow" x1="230" y1="561" x2="288" y2="561" marker-end="url(#arr)"/>
  <line class="flow" x1="500" y1="561" x2="558" y2="561" marker-end="url(#arr)"/>
  <line class="flow" x1="760" y1="561" x2="798" y2="561" marker-end="url(#arr)"/>
  <path class="fb" d="M880,592 C880,618 200,618 135,594" marker-end="url(#arrp)"/>
  <text x="500" y="630" text-anchor="middle" class="fbt">over time → the library converges on all the tools the user needs</text>

  <!-- legend -->
  <g transform="translate(36,660)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#7F77DD"/><text x="20" y="11" class="s">Understand</text>
    <rect x="120" y="0" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#1D9E75"/><text x="140" y="11" class="s">Execute</text>
    <line x1="230" y1="7" x2="262" y2="7" class="fb"/><text x="270" y="11" class="s">feedback / learning</text>
    <line x1="410" y1="7" x2="442" y2="7" class="flow" marker-end="url(#arr)"/><text x="450" y="11" class="s">data flow</text>
  </g>
</svg>
